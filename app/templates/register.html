{% extends "base.html" %}

{% block title %}Register | Customer Entry System{% endblock %}

{% block content %}
    <h1>Create Account</h1>
    <p class="subtitle">Fill in the form below to register a new customer account.</p>

    <form method="POST" action="{{ url_for('auth.register_submit') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="name">First Name</label>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter first name"
                required
            >
        </div>

        <div class="form-group">
            <label for="surname">Last Name</label>
            <input
                type="text"
                id="surname"
                name="surname"
                placeholder="Enter last name"
                required
            >
        </div>

        <div class="form-group">
            <label for="tckn">TCKN</label>
            <input
                type="text"
                id="tckn"
                name="tckn"
                placeholder="Enter 11-digit TCKN"
                maxlength="11"
                required
            >
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
                type="text"
                id="phone"
                name="phone"
                placeholder="Enter phone number"
                required
            >
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter email address"
                required
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                required
            >
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Re-enter password"
                required
            >
        </div>

        <button type="submit" class="btn">Register</button>
    </form>

    <p class="bottom-text">
        Already have an account?
        <a href="{{ url_for('auth.login_form') }}">Login here</a>
    </p>
{% endblock %}
