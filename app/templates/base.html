<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Customer Entry System{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1f4d, #102c6b, #1d4ed8);
            color: #111827;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            width: 100%;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
        }

        .brand {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-size: 15px;
            transition: opacity 0.2s ease;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        .page-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.20);
            padding: 32px 28px;
        }

        .card h1 {
            font-size: 28px;
            color: #0b1f4d;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 13px 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.2s ease;
            background: #0b5ed7;
            color: white;
            margin-top: 8px;
        }

        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .flash-messages {
            margin-bottom: 18px;
        }

        .flash {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .flash.success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .flash.error,
        .flash.danger {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .flash.info {
            background-color: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #93c5fd;
        }

        .flash.warning {
            background-color: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        .bottom-text {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .bottom-text a {
            color: #0b5ed7;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 16px 20px;
                flex-direction: column;
                gap: 10px;
            }

            .nav-links a {
                margin: 0 8px;
            }

            .card {
                padding: 24px 18px;
            }

            .card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="brand">Customer Entry System</a>
        <div class="nav-links">
            <a href="{{ url_for('auth.login_form') }}">Login</a>
            <a href="{{ url_for('auth.register_form') }}">Register</a>
        </div>
    </nav>

    <main class="page-container">
        <div class="card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
