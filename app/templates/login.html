{% extends "base.html" %}

{% block title %}Login | Customer Entry System{% endblock %}

{% block content %}
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to access your customer dashboard securely.</p>

    <form method="POST" action="{{ url_for('auth.login_submit') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
            >
        </div>

        <button type="submit" class="btn">Login</button>
    </form>

    <p class="bottom-text">
        Don’t have an account?
        <a href="{{ url_for('auth.register_form') }}">Create one</a>
    </p>
{% endblock %}
